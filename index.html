    <!-- ───────────────────────────────────────────────────────────
         Content-Security-Policy
         ────────────────────────────────────────────────────────
         Restricts what the browser is allowed to load/execute, blocking
         most XSS vectors. Allowances:
           - default-src 'self': everything from same origin by default
           - script-src 'self': JS only from same origin (no inline, no eval)
           - style-src 'self' 'unsafe-inline': Tailwind 4 injects styles
             at runtime, needs 'unsafe-inline'
           - img-src 'self' data: blob: : data URIs for SVGs, blob for
             canvas textures and GLB binary blobs
           - media-src 'self': music.mp3 and project videos
           - font-src 'self': self-hosted woff2 (no Google Fonts)
           - connect-src 'self' blob:: no external API calls
           - object-src 'none': no Flash/Java/plugins
           - base-uri 'self': prevent <base> tag injection

         Note: 'unsafe-inline' for styles is required by Tailwind 4's
         runtime injection and by inline style attributes used throughout
         the React components. This is acceptable — inline styles are
         trusted (author-controlled), and CSP still blocks the dangerous
         case of attacker-injected inline <style> blocks if script-src
         is also restricted (which it is).

         Note: 'wasm-unsafe-eval' for scripts is required because the
         MeshoptDecoder (used to decompress EXT_meshopt_compression
         in the GLB models) compiles WebAssembly at runtime via
         WebAssembly.instantiate(). This keyword specifically allows
         WASM compilation WITHOUT allowing eval() or inline scripts,
         so XSS surface is unchanged.
         ──────────────────────────────────────────────────────── -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self'; font-src 'self'; connect-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none';" />

    <!-- ───────────────────────────────────────────────────────────
         Preload critical-path assets so the browser starts fetching
         them in parallel with the JS bundle parse, rather than waiting
         for the JS to request them.

         Priority order (what blocks first paint / first frame):
           1. Fonts — block text render
           2. Hero GLB models — block 3D scene first frame
         The hero scene needs typing.glb + chair.glb + desk_and_pc.glb
         to render its first frame. sitting_and_talking.glb is only
         needed when the user scrolls, so it's NOT preloaded.
         ──────────────────────────────────────────────────────── -->

    <!-- Fonts (self-hosted, woff2) -->
    <link rel="preload" as="font" type="font/woff2" href="/urbanist-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/urbanist-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/urbanist-900.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/pro-font-windows-700.woff2" crossorigin />

    <!-- Hero GLB models — needed for first 3D frame -->
    <link rel="preload" as="fetch" href="/typing.glb" crossorigin />
    <link rel="preload" as="fetch" href="/chair.glb" crossorigin />
    <link rel="preload" as="fetch" href="/desk_and_pc.glb" crossorigin />
  </head>
  <body>

    <script type="module" src="/src/main.jsx"></script>
  </body>
